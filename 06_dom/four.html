<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning in Javascript</title>
</head>
<body style="color:white; background-color: #212121;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage(langName){
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }

    addLanguage("Python")
    addLanguage("JavaScript")

    function addOptiLanguage(langName){
       const li = document.createElement('li');
       li.appendChild(document.createTextNode(`${langName}`))
       document.querySelector(".language").appendChild(li)
    }

    addOptiLanguage("C++")

    // Edit
    const secondLanguage = document.querySelector("li:nth-child(2)")
    // secondLang.innerHTML = "Mojo" //Not better approach
    const newli = document.createElement('li')
    newli.textContent = "Mojo"
    secondLanguage.replaceWith(newli)

    //Edit
    const firstLang = document.querySelector("li:first-child");
    firstLang.outerHTML = "<li>TypeScript</li>"

    //remove
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove()
</script>
</html>
